name: Floatwatch Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: floatwatch-release-main
  cancel-in-progress: true

jobs:
  release:
    name: Build Signed APK and Release
    runs-on: ubuntu-latest

    env:
      GRADLE_VERSION: "8.9"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Check signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then echo "Missing secret: KEYSTORE_BASE64"; exit 1; fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then echo "Missing secret: KEYSTORE_PASSWORD"; exit 1; fi
          if [ -z "$KEY_ALIAS" ]; then echo "Missing secret: KEY_ALIAS"; exit 1; fi
          if [ -z "$KEY_PASSWORD" ]; then echo "Missing secret: KEY_PASSWORD"; exit 1; fi

      - name: Restore signing files
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/floatwatch-release.jks"
          cat > "$GITHUB_WORKSPACE/keystore.properties" <<EOF
          storeFile=$GITHUB_WORKSPACE/floatwatch-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Generate version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.1.${VERSION_CODE}"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

      - name: Show Gradle version
        run: gradle --version

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Find and rename APK
        run: |
          mkdir -p output
          APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          cp "$APK_PATH" "output/Floatwatch-${VERSION_NAME}.apk"

      - name: Verify APK signature
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found"
            exit 1
          fi
          "$APKSIGNER" verify --verbose "output/Floatwatch-${VERSION_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Floatwatch-${{ env.VERSION_NAME }}-apk
          path: output/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Floatwatch v${{ env.VERSION_NAME }}
          files: output/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
