name: Floatwatch Release Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # =========================
      # 1. 自动生成版本号
      # =========================
      - name: Generate Version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${VERSION_CODE}"

          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

      # =========================
      # 2. Build APK
      # =========================
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # =========================
      # 3. Rename APK
      # =========================
      - name: Prepare APK
        run: |
          mkdir output
          cp app/build/outputs/apk/release/*.apk output/Floatwatch-${{ env.VERSION_NAME }}.apk

      # =========================
      # 4. Create GitHub Release
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Floatwatch v${{ env.VERSION_NAME }}
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}